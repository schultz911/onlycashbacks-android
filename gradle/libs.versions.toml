[versions]
agp = "9.2.1"
jetbrains-kotlin-android = "2.3.21"
androidbrowserhelper = "2.7.1"
core-ktx = "1.18.0"
timber = "5.0.1"
junit = "4.13.2"
ext-junit = "1.3.0"
espresso-core = "3.7.0"

[libraries]
androidbrowserhelper = { group = "com.google.androidbrowserhelper", name = "androidbrowserhelper", version.ref = "androidbrowserhelper" }
kotlin-stdlib = { group = "org.jetbrains.kotlin", name = "kotlin-stdlib", version.ref = "jetbrains-kotlin-android" }
core-ktx = { group = "androidx.core", name = "core-ktx", version.ref = "core-ktx" }
timber = { group = "com.jakewharton.timber", name = "timber", version.ref = "timber" }
junit = { group = "junit", name = "junit", version.ref = "junit" }
ext-junit = { group = "androidx.test.ext", name = "junit", version.ref = "ext-junit" }
espresso-core = { group = "androidx.test.espresso", name = "espresso-core", version.ref = "espresso-core" }

[plugins]
android-application = { id = "com.android.application", version.ref = "agp" }
jetbrains-kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "jetbrains-kotlin-android" }
